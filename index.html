<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息收集站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            color: #1d2129;
            margin-bottom: 12px;
        }
        .subtitle {
            text-align: center;
            color: #4e5969;
            font-size: 18px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: flex;
            align-items: center;
            color: #1d2129;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .form-label svg {
            margin-right: 8px;
            width: 20px;
            height: 20px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #c9cdd4;
            border-radius: 8px;
            font-size: 16px;
            color: #1d2129;
        }
        .form-input::placeholder {
            color: #86909c;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #e5e6eb;
            color: #c9cdd4;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: not-allowed;
            margin-bottom: 24px;
        }
        .submit-btn.active {
            background-color: #165dff;
            color: white;
            cursor: pointer;
        }
        .divider {
            display: flex;
            align-items: center;
            color: #86909c;
            margin-bottom: 24px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #e5e6eb;
        }
        .divider::before {
            margin-right: 16px;
        }
        .divider::after {
            margin-left: 16px;
        }
        .admin-link {
            text-align: center;
            display: block;
            color: #165dff;
            text-decoration: none;
            font-size: 16px;
        }
        .footer-text {
            text-align: center;
            color: #86909c;
            font-size: 14px;
            margin-top: 32px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>信息收集站</h1>
        <p class="subtitle">请填写以下信息进行提交</p>

        <form id="infoForm">
            <div class="form-group">
                <label class="form-label">
                    <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M512 64a256 256 0 1 0 0 512 256 256 0 0 0 0-512zm0 448a192 192 0 1 1 0-384 192 192 0 0 1 0 384zm256 320H256c-70.69 0-128-57.31-128-128v-64c0-17.67 14.33-32 32-32h704c17.67 0 32 14.33 32 32v64c0 70.69-57.31 128-128 128z" fill="currentColor"/></svg>
                    名字
                </label>
                <input type="text" class="form-input" id="name" placeholder="请输入您的名字" required>
            </div>
            <div class="form-group">
                <label class="form-label">
                    <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M648 272a160 160 0 0 0-273.17 113.17l-256 256A160 160 0 0 0 433.17 825.17l256-256A160 160 0 0 0 648 272zm-113.17 413.17l-256-256a96 96 0 0 1 135.83-135.83l256 256a96 96 0 0 1-135.83 135.83z" fill="currentColor"/></svg>
                    链接
                </label>
                <input type="url" class="form-input" id="link" placeholder="请输入链接地址" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn" disabled>提交</button>
        </form>

        <div class="divider">或</div>
        <a href="admin.html" class="admin-link">管理员入口</a>

        <div class="footer-text">
            您的信息将被安全地发送到后台<br>
            仅管理员可以查看提交的数据
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('name');
        const linkInput = document.getElementById('link');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('infoForm');

        function checkInputs() {
            if (nameInput.value.trim() && linkInput.value.trim()) {
                submitBtn.disabled = false;
                submitBtn.classList.add('active');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.remove('active');
            }
        }

        nameInput.addEventListener('input', checkInputs);
        linkInput.addEventListener('input', checkInputs);

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = nameInput.value.trim();
            const link = linkInput.value.trim();
            const time = new Date().toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            }).replace(/\//g, '-');

            let data = JSON.parse(localStorage.getItem('submissions')) || [];
            data.push({ name, link, time });
            localStorage.setItem('submissions', JSON.stringify(data));

            window.location.href = 'success.html';
        });
    </script>
</body>
</html>
